user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # Compression
    gzip  on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    upstream api_backend {
        server api-server:3847;
        keepalive 16;
    }

    upstream mcp_backend {
        server mcp-server:3848;
        keepalive 8;
    }

    server {
        listen       80;
        server_name  _;

        root  /usr/share/nginx/html;
        index index.html;

        # ── Health check (container liveness) ──────────────────────────
        location = /health {
            access_log off;
            add_header Content-Type application/json always;
            return 200 '{"status":"ok","service":"shuvdex-web"}';
        }

        # ── API proxy ──────────────────────────────────────────────────
        # Forwards /api/* → http://api-server:3847/api/*
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            # Allow large file uploads (skill archives)
            client_max_body_size 64m;
        }

        # ── MCP proxy ──────────────────────────────────────────────────
        # Forwards /mcp → http://mcp-server:3848/mcp
        location = /mcp {
            proxy_pass         http://mcp_backend/mcp;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # ── Static assets (long-lived cache) ──────────────────────────
        location ~* \.(js|css|woff|woff2|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
            try_files  $uri =404;
        }

        # ── SPA fallback ───────────────────────────────────────────────
        # All unmatched paths serve index.html for client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
