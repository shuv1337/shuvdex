              type: integer
              format: int64
              minimum: 1
              maximum: 9007199254740991
              example: 42
          - name: type
            in: query
            required: true
            schema: &a113
              type: array
              items:
                type: string
                enum:
                  - cpu
                  - disk
                  - network
          - name: start
            in: query
            required: true
            schema: &a114
              type: string
          - name: end
            in: query
            required: true
            schema: &a115
              type: string
          - name: step
