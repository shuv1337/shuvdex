commands:
  install: npm install
  build: npm run build
  test: npm test
  lint: npm run lint
  typecheck: npm run typecheck

services:
  # No persistent services needed
  # MCP server uses stdio transport, spawned by Codex Desktop
  # CLI is on-demand, no long-running process
  # OTEL collector already running externally (maple stack on localhost:4318)
